version: '3.8'

services:
  fastapi:
    build: ./fastapi
    container_name: fastapi
    ports:
      - "8000:8000"
    networks:
      - deploy_network

  streamlit:
    build: ./streamlit
    container_name: streamlit
    ports:
      - "8501:8501"
    networks:
      - deploy_network
    depends_on:
      - fastapi

networks:
  deploy_network:
    driver: bridge
